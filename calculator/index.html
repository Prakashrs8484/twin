<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator Twin</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Calculator With Digital Twin</h1>
      <p class="sub">UI events call twin logic. Twin state drives display.</p>

      <section class="calculator" aria-label="Calculator">
        <div class="display-wrap">
          <div id="status" class="status">Ready</div>
          <div id="display" class="display" aria-live="polite">0</div>
        </div>

        <div class="keys">
          <button data-key="C" class="action">C</button>
          <button data-key="DEL" class="action">DEL</button>
          <button data-key="/" class="op">/</button>
          <button data-key="*" class="op">*</button>

          <button data-key="7">7</button>
          <button data-key="8">8</button>
          <button data-key="9">9</button>
          <button data-key="-" class="op">-</button>

          <button data-key="4">4</button>
          <button data-key="5">5</button>
          <button data-key="6">6</button>
          <button data-key="+" class="op">+</button>

          <button data-key="1">1</button>
          <button data-key="2">2</button>
          <button data-key="3">3</button>
          <button data-key="=" class="eq" rowspan="2">=</button>

          <button data-key="0" class="zero">0</button>
          <button data-key=".">.</button>
        </div>
      </section>
    </main>

    <script type="module" src="src/ui/app.js"></script>
  </body>
</html>
